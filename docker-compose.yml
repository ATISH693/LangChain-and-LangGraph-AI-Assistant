services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: pgvector-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: langgraph_rag

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: